name: Build & publish images

# Publishes axis-control, axis-agent, and axis-backup OCI images to GHCR.
#
# Triggers:
#   - push to main           → image tag :edge   (rolling "tip of main")
#   - push tag vMAJOR.MINOR.PATCH → image tags :MAJOR.MINOR.PATCH, :MAJOR.MINOR, :latest
#   - manual workflow_dispatch → useful for backfilling :edge after a CI hiccup
#
# Architecture: linux/amd64 only for v1. Workers are x86 VPSes; if
# arm64 hosts appear, add `linux/arm64` to `platforms:` and a
# `docker/setup-qemu-action` step.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: control
            dockerfile: packages/control/Dockerfile
            image: axis-control
          - package: agent
            dockerfile: packages/agent/Dockerfile
            image: axis-agent
          - package: backup
            dockerfile: packages/backup/Dockerfile
            image: axis-backup
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          # Tag rules:
          #   main      → :edge
          #   v1.2.3    → :1.2.3, :1.2, :latest (latest is implicit for semver)
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.package }}
          cache-to: type=gha,mode=max,scope=${{ matrix.package }}
