# NATS server config for the management plane (#26).
#
# Two listeners:
#   * `nats://` (default port 4222) — internal-only on the docker network.
#     Mgmt-side services (axis-control, the backup snapshot trigger over
#     the internal /snapshot path is unrelated) connect here. Anonymous
#     auth; the docker network is the gate.
#   * WebSocket on 8443 — internal-only too. Caddy reverse-proxies the
#     externally-exposed `wss://nats.${ADMIN_DOMAIN}` onto this port,
#     terminating TLS and gating with basicauth. The broker itself
#     stays anonymous; gating happens upstream.
#
# Why the broker is anonymous on the docker network: see ADR-0001.

# Default NATS client listener (mgmt-side services).
port: 4222

# WebSocket listener (caddy reverse-proxies here).
websocket {
    port: 8443
    # No TLS — Caddy is the only ingress and terminates TLS there.
    # The websocket listener is only reachable inside the docker
    # network, so plaintext between Caddy and NATS is fine.
    no_tls: true
}
