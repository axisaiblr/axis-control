[project]
name = "axis-shared"
version = "0.1.0"
description = "Shared NATS message schemas for axis-control and axis-agent."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/axis_shared"]
