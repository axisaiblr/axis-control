[project]
name = "axis-agent"
version = "0.1.0"
description = "Worker-side sidecar: listens to NATS commands and runs docker compose."
requires-python = ">=3.12"
dependencies = [
    "axis-shared",
    "httpx>=0.27",
    "nats-py[aiohttp]>=2.9",
    "pydantic-settings>=2.5",
]

[project.scripts]
axis-agent = "axis_agent.main:cli_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/axis_agent"]
