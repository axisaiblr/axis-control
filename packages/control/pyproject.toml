[project]
name = "axis-control"
version = "0.3.0"
description = "AXIS AI control plane: admin panel and command dispatcher."
requires-python = ">=3.12"
dependencies = [
    "axis-shared",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "asyncpg>=0.29",
    "nats-py>=2.9",
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
]

[project.scripts]
axis-control = "axis_control.main:cli_main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/axis_control"]
